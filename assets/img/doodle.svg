<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Dheeraj — Nothing-style dot doodle portrait.
       The figure is built entirely from dots of varying radius,
       denser where shadow falls (hair, jaw), sparser on light areas. -->
  <defs>
    <radialGradient id="gd" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ecd5a0"/>
      <stop offset="100%" stop-color="#9a7836"/>
    </radialGradient>
  </defs>

  <g fill="url(#gd)">
    <!-- HAIR (top) — dense cluster -->
    <circle cx="64" cy="34" r="2.6"/><circle cx="76" cy="28" r="2.9"/><circle cx="88" cy="25" r="3"/>
    <circle cx="100" cy="24" r="3.1"/><circle cx="112" cy="25" r="3"/><circle cx="124" cy="28" r="2.9"/>
    <circle cx="136" cy="34" r="2.6"/><circle cx="54" cy="44" r="2.4"/><circle cx="146" cy="44" r="2.4"/>
    <circle cx="70" cy="38" r="2.7"/><circle cx="82" cy="33" r="2.9"/><circle cx="94" cy="31" r="3"/>
    <circle cx="106" cy="31" r="3"/><circle cx="118" cy="33" r="2.9"/><circle cx="130" cy="38" r="2.7"/>
    <circle cx="60" cy="52" r="2.2"/><circle cx="140" cy="52" r="2.2"/>

    <!-- FOREHEAD (sparse) -->
    <circle cx="78" cy="52" r="1.5"/><circle cx="90" cy="50" r="1.5"/><circle cx="100" cy="49" r="1.5"/>
    <circle cx="110" cy="50" r="1.5"/><circle cx="122" cy="52" r="1.5"/>

    <!-- BROWS -->
    <circle cx="80" cy="66" r="1.7"/><circle cx="86" cy="65" r="1.7"/><circle cx="92" cy="66" r="1.7"/>
    <circle cx="108" cy="66" r="1.7"/><circle cx="114" cy="65" r="1.7"/><circle cx="120" cy="66" r="1.7"/>

    <!-- EYES -->
    <circle cx="84" cy="74" r="2.1"/><circle cx="116" cy="74" r="2.1"/>

    <!-- NOSE -->
    <circle cx="100" cy="82" r="1.2"/><circle cx="100" cy="88" r="1.3"/><circle cx="100" cy="94" r="1.4"/>

    <!-- CHEEKS (sparse light) -->
    <circle cx="74" cy="88" r="1"/><circle cx="126" cy="88" r="1"/>
    <circle cx="72" cy="96" r="1.1"/><circle cx="128" cy="96" r="1.1"/>

    <!-- SMILE -->
    <circle cx="86" cy="104" r="1.2"/><circle cx="94" cy="107" r="1.3"/><circle cx="100" cy="108" r="1.3"/>
    <circle cx="106" cy="107" r="1.3"/><circle cx="114" cy="104" r="1.2"/>

    <!-- JAW / CHIN (denser, shadow) -->
    <circle cx="70" cy="108" r="1.8"/><circle cx="130" cy="108" r="1.8"/>
    <circle cx="74" cy="116" r="1.9"/><circle cx="126" cy="116" r="1.9"/>
    <circle cx="80" cy="122" r="2"/><circle cx="120" cy="122" r="2"/>
    <circle cx="88" cy="127" r="2"/><circle cx="112" cy="127" r="2"/>
    <circle cx="96" cy="130" r="2"/><circle cx="104" cy="130" r="2"/>
    <circle cx="100" cy="132" r="2"/>

    <!-- NECK -->
    <circle cx="90" cy="142" r="1.4"/><circle cx="110" cy="142" r="1.4"/>
    <circle cx="88" cy="150" r="1.5"/><circle cx="112" cy="150" r="1.5"/>

    <!-- SHOULDERS / TORSO -->
    <circle cx="56" cy="168" r="2.4"/><circle cx="144" cy="168" r="2.4"/>
    <circle cx="66" cy="162" r="2.2"/><circle cx="134" cy="162" r="2.2"/>
    <circle cx="48" cy="182" r="2.6"/><circle cx="152" cy="182" r="2.6"/>
    <circle cx="44" cy="200" r="2.7"/><circle cx="156" cy="200" r="2.7"/>
    <circle cx="40" cy="220" r="2.8"/><circle cx="160" cy="220" r="2.8"/>
    <circle cx="72" cy="178" r="2.1"/><circle cx="128" cy="178" r="2.1"/>
    <circle cx="80" cy="186" r="2"/><circle cx="120" cy="186" r="2"/>
    <circle cx="88" cy="194" r="1.9"/><circle cx="112" cy="194" r="1.9"/>
    <circle cx="96" cy="200" r="1.8"/><circle cx="104" cy="200" r="1.8"/>
    <circle cx="100" cy="206" r="1.7"/>
    <circle cx="60" cy="210" r="2.4"/><circle cx="140" cy="210" r="2.4"/>
    <circle cx="68" cy="226" r="2.5"/><circle cx="132" cy="226" r="2.5"/>
    <circle cx="80" cy="232" r="2.3"/><circle cx="120" cy="232" r="2.3"/>
    <circle cx="92" cy="236" r="2.2"/><circle cx="108" cy="236" r="2.2"/>
    <circle cx="100" cy="238" r="2.1"/>
  </g>
</svg>
